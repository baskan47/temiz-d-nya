<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Municipality Dashboard - Single File Demo</title>
  <!-- Montserrat font for ALAN Reklam Ajansı landing -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--blue:#2563eb;--bg:#f6f7fb}
    body{margin:0;font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;background:var(--bg);color:#111}
    .app{display:flex;height:100vh}
    .sidebar{width:260px;background:#0f172a;color:#fff;padding:16px;box-sizing:border-box}
    .logo{font-weight:700;margin-bottom:16px}
    .nav{display:flex;flex-direction:column;gap:8px}
    .nav button{background:transparent;border:none;color:inherit;padding:10px;border-radius:6px;text-align:left;cursor:pointer}
    .nav button.active{background:rgba(255,255,255,0.06)}
    .main{flex:1;display:flex;flex-direction:column}
    .header{height:64px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;box-shadow:0 1px 0 rgba(0,0,0,0.06)}
    .content{padding:16px;overflow:auto}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .card{background:#fff;padding:12px;border-radius:8px;box-shadow:0 6px 18px rgba(12,13,20,0.04)}
    .table{width:100%;border-collapse:collapse}
    .table th, .table td{padding:8px;border-bottom:1px solid #eee;font-size:14px}
    .flex{display:flex;gap:12px}
    .badge{padding:4px 8px;border-radius:999px;font-weight:600;font-size:12px}
    .badge.open{background:#fff4e6;color:#92400e}
    .badge.in_progress{background:#fff7ed;color:#b45309}
    .badge.cleaned{background:#ecfdf5;color:#166534}
    .controls{display:flex;gap:8px;align-items:center}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module" src="./src/main.jsx"></script>
</body>
</html>
